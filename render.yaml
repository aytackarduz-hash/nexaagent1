<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA ULTRA AGENT</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04060a;--paper:#070d12;--card:#0b1520;--rim:#0e2235;
  --g1:#00ffe5;--g2:#00aaff;--g3:#7b3fff;--g4:#ff3cac;--g5:#ffcc00;
  --text:#b8d4e8;--dim:#3a5c78;--mute:#162635;
  --scout:#00ffe5;--critic:#ff3cac;--synth:#7b3fff;--evolver:#ffcc00;--distil:#00aaff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--ink);color:var(--text);display:flex;flex-direction:column}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:24px;padding:14px 24px;
  border-bottom:1px solid var(--rim);flex-shrink:0;
  background:linear-gradient(180deg,rgba(0,255,229,.04) 0%,transparent 100%);
}
.logo{font-family:'Syne Mono',monospace;font-size:1.1rem;color:var(--g1);letter-spacing:3px;text-shadow:0 0 20px var(--g1);white-space:nowrap}
.logo span{color:var(--g2)}
.tagline{font-size:.6rem;color:var(--dim);letter-spacing:2px;font-family:'Space Mono',monospace}

.hstats{display:flex;gap:20px;margin-left:auto;align-items:center}
.hstat{text-align:center}
.hstat-n{font-family:'Syne Mono',monospace;font-size:1.3rem;font-weight:700;color:var(--g1);display:block;line-height:1}
.hstat-l{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:1px}

.cycle-badge{
  font-family:'Syne Mono',monospace;font-size:.75rem;
  background:rgba(0,255,229,.08);border:1px solid rgba(0,255,229,.2);
  padding:6px 14px;border-radius:2px;color:var(--g1);
}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL (agent pipeline + controls) ── */
.left{width:280px;flex-shrink:0;border-right:1px solid var(--rim);display:flex;flex-direction:column;overflow:hidden}

.panel-title{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:3px;color:var(--dim);padding:12px 16px 8px;border-bottom:1px solid var(--mute)}

/* Agent pipeline */
.agents{padding:16px;display:flex;flex-direction:column;gap:10px}
.agent-node{
  border:1px solid var(--rim);border-radius:3px;padding:12px;
  position:relative;overflow:hidden;transition:all .3s;
}
.agent-node::before{content:'';position:absolute;left:0;top:0;width:2px;height:100%}
.agent-node.scout::before{background:var(--scout);box-shadow:0 0 8px var(--scout)}
.agent-node.critic::before{background:var(--critic);box-shadow:0 0 8px var(--critic)}
.agent-node.synth::before{background:var(--synth);box-shadow:0 0 8px var(--synth)}
.agent-node.evolver::before{background:var(--evolver);box-shadow:0 0 8px var(--evolver)}
.agent-node.distil::before{background:var(--distil);box-shadow:0 0 8px var(--distil)}

.agent-node.active{background:rgba(0,255,229,.04)}
.agent-node.firing{animation:agentFire .4s ease}
@keyframes agentFire{0%{background:rgba(0,255,229,.15)}100%{background:transparent}}

.agent-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.agent-dot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.agent-dot.active{animation:blink .6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.scout .agent-dot.active{background:var(--scout);box-shadow:0 0 5px var(--scout)}
.critic .agent-dot.active{background:var(--critic);box-shadow:0 0 5px var(--critic)}
.synth .agent-dot.active{background:var(--synth);box-shadow:0 0 5px var(--synth)}
.evolver .agent-dot.active{background:var(--evolver);box-shadow:0 0 5px var(--evolver)}
.distil .agent-dot.active{background:var(--distil);box-shadow:0 0 5px var(--distil)}

.agent-name{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:2px}
.scout .agent-name{color:var(--scout)}
.critic .agent-name{color:var(--critic)}
.synth .agent-name{color:var(--synth)}
.evolver .agent-name{color:var(--evolver)}
.distil .agent-name{color:var(--distil)}

.agent-desc{font-size:.62rem;color:var(--dim);line-height:1.5}
.agent-last{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--dim);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Flow arrows */
.flow-arrow{text-align:center;color:var(--mute);font-size:.7rem;padding:2px 0}

/* Controls */
.controls{padding:16px;border-top:1px solid var(--mute);display:flex;flex-direction:column;gap:8px;margin-top:auto}
.api-input{
  background:var(--ink);border:1px solid var(--rim);color:var(--text);
  padding:8px 10px;font-family:'Space Mono',monospace;font-size:.65rem;
  border-radius:2px;outline:none;width:100%;
}
.api-input::placeholder{color:var(--mute)}
.api-input:focus{border-color:var(--g2)}

.btn{
  padding:9px 14px;border:none;border-radius:2px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;
  transition:all .2s;text-transform:uppercase;font-weight:700;
}
.btn-run{background:linear-gradient(135deg,#006644,#00cc77);color:#000}
.btn-run:hover:not(:disabled){box-shadow:0 0 20px rgba(0,255,100,.4);transform:translateY(-1px)}
.btn-auto{background:transparent;color:var(--g2);border:1px solid var(--g2)}
.btn-auto:hover:not(:disabled){background:rgba(0,170,255,.1)}
.btn-auto.active{background:rgba(0,170,255,.15);border-color:var(--g2);color:var(--g2)}
.btn-distil{background:transparent;color:var(--distil);border:1px solid var(--distil)}
.btn-distil:hover:not(:disabled){background:rgba(0,170,255,.08)}
.btn-clear{background:transparent;color:#444;border:1px solid #222;font-size:.55rem}
.btn-clear:hover:not(:disabled){color:#ff3c3c;border-color:#ff3c3c}
.btn:disabled{opacity:.35;cursor:not-allowed}

.interval-row{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:.58rem;color:var(--dim)}
.interval-row input{width:50px;background:var(--ink);border:1px solid var(--rim);color:var(--text);padding:4px 6px;font-family:'Space Mono',monospace;font-size:.6rem;border-radius:2px;outline:none;text-align:center}

/* ── CENTER PANEL (findings + terminal) ── */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--rim)}

/* tabs */
.tabs{display:flex;border-bottom:1px solid var(--rim);flex-shrink:0}
.tab{padding:10px 20px;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:1px;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .2s;user-select:none}
.tab.active{color:var(--g1);border-color:var(--g1)}
.tab-badge{display:inline-block;margin-left:6px;background:var(--mute);padding:1px 6px;border-radius:10px;font-size:.5rem}
.tab.active .tab-badge{background:rgba(0,255,229,.15);color:var(--g1)}

/* search bar */
.search-row{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--mute);flex-shrink:0;align-items:center}
.search-field{
  flex:1;background:var(--card);border:1px solid var(--rim);color:var(--text);
  padding:7px 12px;font-family:'Space Mono',monospace;font-size:.65rem;
  border-radius:2px;outline:none;
}
.search-field:focus{border-color:var(--g1)}
.search-field::placeholder{color:var(--mute)}

/* cat filter chips */
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;padding:0}
.cchip{padding:3px 10px;border-radius:2px;border:1px solid;font-family:'Space Mono',monospace;font-size:.55rem;cursor:pointer;transition:all .2s;user-select:none}
.cchip:not(.on){opacity:.25}.cchip:hover{opacity:.8}
.cc-crispr{border-color:#ff6bfd;color:#ff6bfd}.cc-nootropics{border-color:#00ff6a;color:#00ff6a}
.cc-peptides{border-color:#00c4ff;color:#00c4ff}.cc-longevity{border-color:#ffcc00;color:#ffcc00}
.cc-epigenetic{border-color:#ff8c42;color:#ff8c42}.cc-mrna{border-color:#bd93f9;color:#bd93f9}
.cc-exosomes{border-color:#50fa7b;color:#50fa7b}.cc-outofbox{border-color:#ff5555;color:#ff5555}
.cc-synthesis{border-color:#7b3fff;color:#7b3fff}.cc-distilled{border-color:#00aaff;color:#00aaff}

/* scroll container */
.scroll{flex:1;overflow-y:auto;padding:12px 16px}

/* finding card */
.fcard{
  background:var(--card);border:1px solid var(--rim);border-radius:3px;
  padding:14px;margin-bottom:10px;position:relative;overflow:hidden;
  transition:all .25s;animation:fadeUp .4s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fcard:hover{border-color:var(--dim);transform:translateY(-1px)}
.fcard::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%}
.fc-crispr::before{background:#ff6bfd}.fc-nootropics::before{background:#00ff6a}
.fc-peptides::before{background:#00c4ff}.fc-longevity::before{background:#ffcc00}
.fc-epigenetic::before{background:#ff8c42}.fc-mrna::before{background:#bd93f9}
.fc-exosomes::before{background:#50fa7b}.fc-outofbox::before{background:#ff5555}
.fc-synthesis::before{background:var(--synth);box-shadow:0 0 6px var(--synth)}
.fc-distilled::before{background:var(--g2);box-shadow:0 0 6px var(--g2)}

.fcard-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.fcard-title{font-size:.85rem;font-weight:600;line-height:1.3;flex:1}
.fcard-cat{font-family:'Space Mono',monospace;font-size:.5rem;padding:3px 8px;border-radius:2px;border:1px solid;flex-shrink:0;letter-spacing:1px;text-transform:uppercase}
.cat-crispr{border-color:#ff6bfd;color:#ff6bfd;background:rgba(255,107,253,.07)}
.cat-nootropics{border-color:#00ff6a;color:#00ff6a;background:rgba(0,255,106,.07)}
.cat-peptides{border-color:#00c4ff;color:#00c4ff;background:rgba(0,196,255,.07)}
.cat-longevity{border-color:#ffcc00;color:#ffcc00;background:rgba(255,204,0,.07)}
.cat-epigenetic{border-color:#ff8c42;color:#ff8c42;background:rgba(255,140,66,.07)}
.cat-mrna{border-color:#bd93f9;color:#bd93f9;background:rgba(189,147,249,.07)}
.cat-exosomes{border-color:#50fa7b;color:#50fa7b;background:rgba(80,250,123,.07)}
.cat-outofbox{border-color:#ff5555;color:#ff5555;background:rgba(255,85,85,.07)}
.cat-synthesis{border-color:var(--synth);color:var(--synth);background:rgba(123,63,255,.07)}
.cat-distilled{border-color:var(--g2);color:var(--g2);background:rgba(0,170,255,.07)}

.fcard-body{font-size:.75rem;color:#6e8fa8;line-height:1.6;margin-bottom:8px}
.fcard-sig{font-size:.7rem;color:var(--g1);opacity:.7;font-style:italic;margin-bottom:8px}
.fcard-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ftag{font-family:'Space Mono',monospace;font-size:.5rem;color:var(--mute);border:1px solid var(--mute);padding:1px 6px;border-radius:1px}
.fcard-meta{font-family:'Space Mono',monospace;font-size:.52rem;color:var(--mute);margin-left:auto}
.fcard-scores{display:flex;gap:4px;align-items:center;margin-top:6px}
.score-pip{width:16px;height:3px;border-radius:1px;background:var(--mute)}
.score-pip.lit{background:var(--g1)}
.del-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--mute);cursor:pointer;font-size:.7rem;opacity:0;padding:2px 5px}
.fcard:hover .del-btn{opacity:1}
.del-btn:hover{color:#ff3c3c}

/* empty state */
.empty{text-align:center;padding:60px 20px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--dim);line-height:2.5}

/* terminal */
.terminal{height:160px;background:#020609;border-top:1px solid var(--rim);overflow-y:auto;padding:10px 14px;font-family:'Space Mono',monospace;font-size:.62rem;flex-shrink:0}
.tline{display:flex;gap:10px;line-height:1.8}
.ttime{color:var(--mute)}.tinfo{color:var(--g2)}.tsuccess{color:var(--g1)}
.twarn{color:var(--g5)}.terror{color:var(--g4)}.tscan{color:var(--synth)}

/* ── RIGHT PANEL (genome + graph) ── */
.right{width:300px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}

/* genome evolution */
.genome-list{flex:1;overflow-y:auto;padding:10px}
.gevo-item{
  background:var(--card);border:1px solid var(--rim);border-radius:3px;
  padding:10px;margin-bottom:8px;position:relative;animation:fadeUp .3s ease;
}
.gevo-cat{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:2px;color:var(--evolver);margin-bottom:6px}
.gevo-body{font-size:.68rem;color:var(--text);line-height:1.5;margin-bottom:6px}
.gevo-reasoning{font-size:.6rem;color:var(--dim);font-style:italic;line-height:1.4}
.gevo-cycle{position:absolute;top:8px;right:10px;font-family:'Space Mono',monospace;font-size:.5rem;color:var(--mute)}
.gevo-shift{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--g2);margin-top:5px}

/* knowledge graph canvas */
.graph-wrap{height:240px;border-top:1px solid var(--rim);position:relative;flex-shrink:0}
.graph-wrap canvas{width:100%;height:100%}
.graph-label{position:absolute;top:6px;left:10px;font-family:'Space Mono',monospace;font-size:.52rem;color:var(--dim);letter-spacing:2px}

/* progress bar */
.prog-wrap{height:3px;background:var(--mute);flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g1),var(--g2));transition:width .5s ease;width:0%}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--mute);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">NEXA <span>ULTRA</span> AGENT</div>
    <div class="tagline">SELF-EVOLVING BIOTECH RESEARCH INTELLIGENCE · 4-AGENT PIPELINE</div>
  </div>
  <div class="hstats">
    <div class="hstat"><span class="hstat-n" id="hFindings">0</span><span class="hstat-l">FINDINGS</span></div>
    <div class="hstat"><span class="hstat-n" id="hInsights" style="color:var(--synth)">0</span><span class="hstat-l">INSIGHTS</span></div>
    <div class="hstat"><span class="hstat-n" id="hEvos" style="color:var(--evolver)">0</span><span class="hstat-l">EVOLUTIONS</span></div>
  </div>
  <div class="cycle-badge">CYCLE <span id="cycleNum">0</span></div>
</header>

<!-- PROGRESS -->
<div class="prog-wrap"><div class="prog-fill" id="progFill"></div></div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: AGENTS + CONTROLS -->
  <div class="left">
    <div class="panel-title">AGENT PIPELINE</div>
    <div class="agents">
      <div class="agent-node scout" id="node-scout">
        <div class="agent-header"><div class="agent-dot" id="dot-scout"></div><div class="agent-name">SCOUT</div></div>
        <div class="agent-desc">Kategorileri araştırır, ham bulgular üretir. Evolving prompt genome ile yönlendirilir.</div>
        <div class="agent-last" id="last-scout">—</div>
      </div>
      <div class="flow-arrow">↓</div>
      <div class="agent-node critic" id="node-critic">
        <div class="agent-header"><div class="agent-dot" id="dot-critic"></div><div class="agent-name">CRITIC</div></div>
        <div class="agent-desc">Ham bulguları doğrular, kalite skoru verir, zayıfları eler.</div>
        <div class="agent-last" id="last-critic">—</div>
      </div>
      <div class="flow-arrow">↓</div>
      <div class="agent-node synth" id="node-synth">
        <div class="agent-header"><div class="agent-dot" id="dot-synth"></div><div class="agent-name">SYNTHESIZER</div></div>
        <div class="agent-desc">Kategoriler arası bağlantılar bulur, compound insight üretir.</div>
        <div class="agent-last" id="last-synth">—</div>
      </div>
      <div class="flow-arrow">↓</div>
      <div class="agent-node evolver" id="node-evolver">
        <div class="agent-header"><div class="agent-dot" id="dot-evolver"></div><div class="agent-name">EVOLVER</div></div>
        <div class="agent-desc">Sonuçları analiz eder, research promptlarını yeniden yazar. Kendini geliştirir.</div>
        <div class="agent-last" id="last-evolver">—</div>
      </div>
      <div class="flow-arrow">↓</div>
      <div class="agent-node distil" id="node-distil">
        <div class="agent-header"><div class="agent-dot" id="dot-distil"></div><div class="agent-name">DISTILLER</div></div>
        <div class="agent-desc">Her 3 cycle'da tüm bilgiyi kristalize eder, master insights üretir.</div>
        <div class="agent-last" id="last-distil">—</div>
      </div>
    </div>

    <div class="controls">
      <input type="password" class="api-input" id="apiKey" placeholder="Gemini API Key (veya env var)">
      <button class="btn btn-run" id="runBtn" onclick="runCycle()">▶ TEK CYCLE ÇALIŞTIR</button>
      <div class="interval-row">
        <button class="btn btn-auto" id="autoBtn" onclick="toggleAuto()" style="flex:1">⟳ OTO MOD</button>
        <input type="number" id="intervalIn" value="45" min="15" max="360">
        <span>dk</span>
      </div>
      <button class="btn btn-distil" onclick="forceDistil()">◈ ZORLA DAMITMA</button>
      <button class="btn btn-clear" onclick="clearData()">✕ TÜM VERİ SİL</button>
    </div>
  </div>

  <!-- CENTER: FINDINGS -->
  <div class="center">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('findings',this)">BULGULAR<span class="tab-badge" id="tbFindings">0</span></div>
      <div class="tab" onclick="switchTab('insights',this)">INSIGHTS<span class="tab-badge" id="tbInsights">0</span></div>
      <div class="tab" onclick="switchTab('distilled',this)">DAMITMA<span class="tab-badge" id="tbDistilled">0</span></div>
    </div>
    <div class="search-row">
      <input class="search-field" placeholder="Ara..." id="searchIn" oninput="renderActive()">
      <div class="cat-chips" id="catChips"></div>
    </div>
    <div class="scroll" id="mainScroll"></div>
    <div class="terminal" id="terminal">
      <div class="tline"><span class="ttime">00:00:00</span><span class="tinfo">NEXA ULTRA AGENT — 4-agent pipeline hazır</span></div>
    </div>
  </div>

  <!-- RIGHT: GENOME + GRAPH -->
  <div class="right">
    <div class="panel-title">PROMPT GENOME EVRİMİ</div>
    <div class="genome-list" id="genomeList">
      <div class="empty" style="font-size:.6rem;padding:30px 10px">Evrim başlamadı.<br>İlk cycle sonrası<br>görünür.</div>
    </div>
    <div class="graph-wrap">
      <div class="graph-label">KNOWLEDGE GRAPH</div>
      <canvas id="graphCanvas"></canvas>
    </div>
  </div>

</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let findings = [], insights = [], distilled = [];
let evolutions = [], genome = {};
let activeTab = 'findings';
let autoOn = false;
let activeChips = new Set(['crispr','nootropics','peptides','longevity','epigenetic','mrna','exosomes','outofbox','synthesis','distilled']);

const CAT_LABELS = {
  crispr:'CRISPR/DNA',nootropics:'NOOTROPİCS',peptides:'PEPTİDLER',longevity:'LONGEVİTY',
  epigenetic:'EPİGENETİK',mrna:'mRNA/sgRNA',exosomes:'EXOSOMES',outofbox:'OUT-OF-BOX',
  synthesis:'SYNTHESIS',distilled:'DISTILLED',
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildChips();
loadState();
connectSSE();

// ─── SSE ──────────────────────────────────────────────────────────────────────
function connectSSE(){
  const es = new EventSource('/stream');
  es.onmessage = e => {
    try { handleEvent(JSON.parse(e.data)); } catch {}
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}

function handleEvent(ev){
  const {type, data} = ev;
  switch(type){
    case 'agent_log':
      tlog(data.msg, data.level || 'info');
      activateAgent(data.agent);
      break;
    case 'new_finding':
      findings.unshift(data);
      updateCounts();
      renderActive();
      updateGraph();
      break;
    case 'new_insight':
      insights.unshift(data);
      updateCounts();
      if(activeTab==='insights') renderActive();
      break;
    case 'distilled':
      distilled = data.insights || [];
      updateCounts();
      if(activeTab==='distilled') renderActive();
      break;
    case 'genome_evolved':
      appendEvolution(data);
      break;
    case 'cycle_start':
      document.getElementById('cycleNum').textContent = data.cycle;
      setProgress(0);
      break;
    case 'cycle_complete':
      setProgress(100);
      document.getElementById('hFindings').textContent = data.total_findings;
      document.getElementById('hInsights').textContent = data.total_insights;
      setTimeout(()=>setProgress(0), 2000);
      break;
    case 'progress':
      if(data.total) setProgress(Math.round(data.done/data.total*100));
      break;
    case 'retry':
      tlog(`⏳ Rate limit → ${data.model} — ${data.wait}s bekleniyor...`, 'warn');
      break;
    case 'distilling':
      tlog(`◈ Damıtma başlıyor — ${data.count} bulgu işleniyor...`, 'info');
      activateAgent('DISTIL');
      break;
    case 'auto_started':
      autoOn=true; updateAutoBtn();
      tlog(`⟳ Oto Mod AKTİF — her ${data.interval_min}dk cycle`, 'success');
      break;
    case 'auto_stopped':
      autoOn=false; updateAutoBtn();
      tlog('⊘ Oto Mod durduruldu', 'warn');
      break;
    case 'cleared':
      findings=[]; insights=[]; distilled=[]; evolutions=[];
      updateCounts(); renderActive();
      document.getElementById('genomeList').innerHTML = '<div class="empty" style="font-size:.6rem;padding:30px 10px">Temizlendi.</div>';
      break;
  }
}

// ─── LOAD STATE ───────────────────────────────────────────────────────────────
async function loadState(){
  try {
    const r = await fetch('/api/state');
    const d = await r.json();
    findings  = d.findings  || [];
    insights  = d.insights  || [];
    evolutions= d.evolution_log || [];
    genome    = d.prompt_genome  || {};
    document.getElementById('cycleNum').textContent    = d.cycle_count || 0;
    document.getElementById('hFindings').textContent   = d.counts?.findings || 0;
    document.getElementById('hInsights').textContent   = d.counts?.insights || 0;
    document.getElementById('hEvos').textContent       = d.counts?.evolutions || 0;
    updateCounts();
    renderActive();
    renderEvolutions();
    updateGraph();
    tlog(`✓ ${d.counts?.findings||0} bulgu, ${d.counts?.insights||0} insight yüklendi`, 'success');
  } catch(e) { tlog(`State yükleme hatası: ${e.message}`, 'error'); }
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
async function runCycle(){
  const key = document.getElementById('apiKey').value.trim();
  const cats = [...activeChips].filter(c => Object.keys(CAT_LABELS).includes(c) && c!=='synthesis' && c!=='distilled');
  tlog('▶ Cycle başlatılıyor...', 'info');
  document.getElementById('runBtn').disabled = true;
  try {
    const r = await fetch('/api/run_cycle', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({apiKey:key, categories:cats})});
    const d = await r.json();
    if(d.error) tlog(`✗ ${d.error}`, 'error');
    else tlog(`✓ Cycle ${d.cycle} başladı`, 'success');
  } catch(e) { tlog(`✗ ${e.message}`, 'error'); }
  setTimeout(()=>document.getElementById('runBtn').disabled=false, 3000);
}

async function toggleAuto(){
  const key  = document.getElementById('apiKey').value.trim();
  const intv = parseInt(document.getElementById('intervalIn').value) || 45;
  if(autoOn){
    await fetch('/api/auto', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'stop'})});
  } else {
    const cats = [...activeChips].filter(c => c!=='synthesis' && c!=='distilled');
    const r = await fetch('/api/auto', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'start', apiKey:key, categories:cats, interval_min:intv})});
    const d = await r.json();
    if(d.error) { tlog(`✗ ${d.error}`, 'error'); return; }
  }
}

async function forceDistil(){
  const key = document.getElementById('apiKey').value.trim();
  tlog('◈ Damıtma zorlanıyor...', 'info');
  await fetch('/api/distill', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({apiKey:key})});
}

async function clearData(){
  if(!confirm('Tüm veri silinecek?')) return;
  await fetch('/api/clear', {method:'POST'});
}

function updateAutoBtn(){
  const btn = document.getElementById('autoBtn');
  btn.textContent = autoOn ? '⊘ OTO DURDUR' : '⟳ OTO MOD';
  btn.classList.toggle('active', autoOn);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab, el){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderActive();
}

// ─── CHIPS ────────────────────────────────────────────────────────────────────
function buildChips(){
  const wrap = document.getElementById('catChips');
  Object.entries(CAT_LABELS).forEach(([cat, lbl])=>{
    const d = document.createElement('div');
    d.className = `cchip cc-${cat} on`;
    d.dataset.cat = cat;
    d.textContent = lbl;
    d.onclick = ()=>{ d.classList.toggle('on'); activeChips.has(cat)?activeChips.delete(cat):activeChips.add(cat); renderActive(); };
    wrap.appendChild(d);
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderActive(){
  if(activeTab==='findings') renderItems(findings.filter(f=>activeChips.has(f.category)));
  else if(activeTab==='insights') renderItems(insights.filter(f=>activeChips.has(f.category||'synthesis')||activeChips.has('synthesis')));
  else if(activeTab==='distilled') renderItems(distilled);
}

function renderItems(items){
  const q = (document.getElementById('searchIn').value||'').toLowerCase();
  const filtered = q ? items.filter(f=>(f.title+' '+f.body).toLowerCase().includes(q)) : items;
  const c = document.getElementById('mainScroll');
  if(!filtered.length){ c.innerHTML=`<div class="empty">◈<br>${items.length===0?'Henüz veri yok.<br>Cycle başlatın.':'Arama sonucu bulunamadı.'}</div>`; return; }
  c.innerHTML='';
  filtered.forEach(f=>{
    const cat = f.category || (f.type==='synthesis'?'synthesis':'distilled');
    const div = document.createElement('div');
    div.className = `fcard fc-${cat}`;
    const scores = Array(5).fill(0).map((_,i)=>`<div class="score-pip ${i<Math.ceil((f.noveltyScore||5)/2)?'lit':''}"></div>`).join('');
    const qScores = f.qualityScore ? Array(5).fill(0).map((_,i)=>`<div class="score-pip ${i<Math.ceil(f.qualityScore/2)?'lit':''}"></div>`).join('') : '';
    const ts = f.timestamp ? new Date(f.timestamp).toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'}) : '';
    const catLabel = CAT_LABELS[cat] || cat.toUpperCase();
    div.innerHTML = `
      <button class="del-btn" onclick="delItem('${f.id}','${activeTab}')">✕</button>
      <div class="fcard-top">
        <div class="fcard-title">${esc(f.title)}</div>
        <div class="fcard-cat cat-${cat}">${catLabel}</div>
      </div>
      <div class="fcard-body">${esc(f.body||'')}</div>
      ${f.significance?`<div class="fcard-sig">→ ${esc(f.significance)}</div>`:''}
      ${f.protocol_hint?`<div class="fcard-sig">⚡ ${esc(f.protocol_hint)}</div>`:''}
      <div class="fcard-footer">
        ${(f.tags||[]).map(t=>`<span class="ftag">${esc(t)}</span>`).join('')}
        <div class="fcard-meta">C${f.cycle||'?'} · ${ts}</div>
      </div>
      <div class="fcard-scores">${scores}${f.noveltyScore?`<span style="font-family:'Space Mono',monospace;font-size:.52rem;color:var(--dim);margin-left:6px">N:${f.noveltyScore}</span>`:''}
      ${qScores?`<span style="margin-left:10px">${qScores}</span><span style="font-family:'Space Mono',monospace;font-size:.52rem;color:var(--dim);margin-left:4px">Q:${f.qualityScore}</span>`:''}
      </div>`;
    c.appendChild(div);
  });
}

function delItem(id, tab){
  if(tab==='findings') findings = findings.filter(f=>f.id!==id);
  else if(tab==='insights') insights = insights.filter(f=>f.id!==id);
  else distilled = distilled.filter(f=>f.id!==id);
  renderActive(); updateCounts();
}

function updateCounts(){
  document.getElementById('tbFindings').textContent  = findings.length;
  document.getElementById('tbInsights').textContent  = insights.length;
  document.getElementById('tbDistilled').textContent = distilled.length;
  document.getElementById('hFindings').textContent   = findings.length;
  document.getElementById('hInsights').textContent   = insights.length;
  document.getElementById('hEvos').textContent       = evolutions.length;
}

// ─── GENOME EVOLUTION ─────────────────────────────────────────────────────────
function appendEvolution(data){
  evolutions.unshift({
    category: data.category,
    new: data.new_genome,
    reasoning: data.reasoning,
    cycle: document.getElementById('cycleNum').textContent,
    ts: new Date().toLocaleTimeString('tr-TR'),
  });
  document.getElementById('hEvos').textContent = evolutions.length;
  renderEvolutions();
}

function renderEvolutions(){
  const wrap = document.getElementById('genomeList');
  if(!evolutions.length){ wrap.innerHTML='<div class="empty" style="font-size:.6rem;padding:30px 10px">Evrim başlamadı.</div>'; return; }
  wrap.innerHTML='';
  evolutions.slice(0,15).forEach(ev=>{
    const d = document.createElement('div'); d.className='gevo-item';
    d.innerHTML=`
      <div class="gevo-cat">${(ev.category||'').toUpperCase()}</div>
      <div class="gevo-cycle">C${ev.cycle||'?'} · ${ev.ts||''}</div>
      <div class="gevo-body">${esc(ev.new||'')}</div>
      ${ev.reasoning?`<div class="gevo-reasoning">${esc(ev.reasoning)}</div>`:''}
      ${ev.focus_shift?`<div class="gevo-shift">↳ ${esc(ev.focus_shift)}</div>`:''}`;
    wrap.appendChild(d);
  });
}

// ─── KNOWLEDGE GRAPH ──────────────────────────────────────────────────────────
const CAT_COLORS = {
  crispr:'#ff6bfd',nootropics:'#00ff6a',peptides:'#00c4ff',longevity:'#ffcc00',
  epigenetic:'#ff8c42',mrna:'#bd93f9',exosomes:'#50fa7b',outofbox:'#ff5555',
  synthesis:'#7b3fff',distilled:'#00aaff',
};
let graphNodes = [], graphEdges = [], animFrame = null;

function updateGraph(){
  const canvas = document.getElementById('graphCanvas');
  const wrap   = canvas.parentElement;
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;

  // build nodes from latest 30 findings
  const recent = findings.slice(0, 30);
  const cx = canvas.width/2, cy = canvas.height/2, r = Math.min(cx,cy)*0.72;
  graphNodes = recent.map((f,i)=>{
    const angle = (i/recent.length)*Math.PI*2;
    return {
      x: cx + r*Math.cos(angle)*(0.5+Math.random()*0.5),
      y: cy + r*Math.sin(angle)*(0.5+Math.random()*0.5),
      cat: f.category,
      title: f.title?.slice(0,20)||'',
      r: 4 + (f.noveltyScore||5)*0.6,
      vx: (Math.random()-.5)*0.3,
      vy: (Math.random()-.5)*0.3,
    };
  });

  // edges between same-category nodes
  graphEdges = [];
  for(let i=0;i<graphNodes.length;i++){
    for(let j=i+1;j<graphNodes.length;j++){
      if(graphNodes[i].cat === graphNodes[j].cat && Math.random()<0.25)
        graphEdges.push([i,j]);
    }
  }

  if(animFrame) cancelAnimationFrame(animFrame);
  drawGraph();
}

function drawGraph(){
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // edges
  graphEdges.forEach(([a,b])=>{
    const na=graphNodes[a], nb=graphNodes[b];
    ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y);
    ctx.strokeStyle = CAT_COLORS[na.cat]+'33';
    ctx.lineWidth = .8; ctx.stroke();
  });

  // nodes
  graphNodes.forEach(n=>{
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
    ctx.fillStyle = CAT_COLORS[n.cat]+'99';
    ctx.shadowColor = CAT_COLORS[n.cat];
    ctx.shadowBlur  = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // gentle float
  graphNodes.forEach(n=>{
    n.x += n.vx; n.y += n.vy;
    if(n.x<n.r||n.x>canvas.width-n.r)  n.vx*=-1;
    if(n.y<n.r||n.y>canvas.height-n.r) n.vy*=-1;
  });

  animFrame = requestAnimationFrame(drawGraph);
}

// ─── AGENT ACTIVITY ───────────────────────────────────────────────────────────
const AGENT_MAP = {
  SCOUT:'scout', CRITIC:'critic', SYNTH:'synth', EVOLVER:'evolver', DISTIL:'distil', SYSTEM:'scout'
};
let agentTimers = {};

function activateAgent(name){
  const key = AGENT_MAP[name];
  if(!key) return;
  const dot = document.getElementById(`dot-${key}`);
  const node = document.getElementById(`node-${key}`);
  if(dot) dot.classList.add('active');
  if(node) node.classList.add('active','firing');
  clearTimeout(agentTimers[key]);
  agentTimers[key] = setTimeout(()=>{
    if(dot) dot.classList.remove('active');
    if(node) node.classList.remove('active','firing');
  }, 4000);
}

// ─── TERMINAL ─────────────────────────────────────────────────────────────────
const TYPE_CLASS = {info:'tinfo',success:'tsuccess',warn:'twarn',error:'terror',scan:'tscan'};

function tlog(msg, type='info'){
  const t = document.getElementById('terminal');
  const now = new Date();
  const ts  = [now.getHours(),now.getMinutes(),now.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  const d = document.createElement('div'); d.className='tline';
  d.innerHTML=`<span class="ttime">${ts}</span><span class="${TYPE_CLASS[type]||'tinfo'}">${esc(msg)}</span>`;
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
  while(t.children.length > 100) t.removeChild(t.children[0]);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setProgress(pct){ document.getElementById('progFill').style.width = pct+'%'; }

// resize graph on window resize
window.addEventListener('resize', ()=>{ if(findings.length) updateGraph(); });
</script>
